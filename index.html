<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftDrop P2P Pro</title>
    <!-- PeerJS for WebRTC Connections -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --blue: #1a7fe0;
            --blue-hover: #1565c0;
            --bg: #f0f4f8;
            --text: #0f172a;
            --text-light: #64748b;
            --green: #10b981;
            --green-hover: #059669;
            --red: #ef4444;
            --red-hover: #dc2626;
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            background: var(--card-bg);
            width: 90%;
            max-width: 480px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--border);
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            color: var(--blue);
            margin-top: 0;
            font-size: 1.6rem;
            margin-bottom: 25px;
        }
        
        .status-box { text-align: center; margin-bottom: 25px; }
        .pill { 
            padding: 8px 16px; 
            border-radius: 20px; 
            font-size: 0.85rem; 
            font-weight: 600; 
            background: #f1f5f9; 
            color: var(--text-light);
            display: inline-block;
            transition: all 0.3s ease;
        }
        .pill.online { background: #d1fae5; color: var(--green); }
        .pill.waiting { background: #fef3c7; color: #d97706; }
        .pill.error { background: #fee2e2; color: var(--red); }
        
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 15px;
            transition: border-color 0.2s;
            text-align: center;
            font-weight: bold;
            letter-spacing: 2px;
        }
        input[type="text"]:focus { border-color: var(--blue); }
        
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-sizing: border-box;
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-blue { background: var(--blue); color: white; }
        .btn-blue:hover:not(:disabled) { background: var(--blue-hover); }
        
        .btn-red { background: var(--red); color: white; margin-top: 10px; }
        .btn-red:hover:not(:disabled) { background: var(--red-hover); }
        
        .btn-green { background: var(--green); color: white; text-decoration: none; margin-top: 15px; }
        .btn-green:hover:not(:disabled) { background: var(--green-hover); }

        .btn-exit { 
            background: transparent; 
            color: var(--text-light); 
            border: 2px solid var(--border); 
            margin-top: 15px; 
        }
        .btn-exit:hover:not(:disabled) { background: #f8fafc; color: var(--text); }

        .transfer-box {
            background: #f8fafc;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            display: none;
            margin-top: 25px;
        }

        .file-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 15px;
        }
        #file-name {
            font-weight: bold;
            font-size: 1rem;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text);
        }
        #transfer-mode {
            font-size: 0.75rem;
            color: var(--text-light);
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 4px;
            letter-spacing: 1px;
        }
        
        .progress-bg {
            width: 100%;
            height: 14px;
            background: #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--blue), #4facfe);
            transition: width 0.15s linear;
            border-radius: 8px;
        }
        
        .stats-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 5px;
        }
        .stats-val { font-weight: 600; color: var(--text); }
        .text-blue { color: var(--blue); }

    </style>
</head>
<body>

<div class="card">
    <div class="status-box"><span id="status" class="pill">Waiting to Connect...</span></div>
    <h2>🚀 SwiftDrop Pro</h2>
    
    <!-- 1. ROOM SETUP UI -->
    <div id="setup-ui">
        <input type="text" id="room-id" placeholder="Enter Room Code (e.g. 1234)" autocomplete="off">
        <button class="btn btn-blue" onclick="startPeer()" id="connect-btn">🔗 Connect / Create Room</button>
    </div>

    <!-- 2. MAIN LOBBY UI (Visible when 2 peers are connected) -->
    <div id="main-ui" style="display:none;">
        <input type="file" id="file-input" style="display:none" onchange="sendFile()">
        <button class="btn btn-blue" id="select-file-btn" onclick="document.getElementById('file-input').click()">📤 Select & Send File</button>
        <button class="btn btn-exit" id="exit-btn" onclick="exitRoom()">🚪 Exit Room</button>
    </div>

    <!-- 3. TRANSFER UI (Visible during file transfer) -->
    <div id="transfer-ui" class="transfer-box">
        <div class="file-info">
            <div id="file-name">filename.mp4</div>
            <div id="transfer-mode">Initializing...</div>
        </div>
        
        <!-- Stats -->
        <div class="stats-row">
            <span>Progress: <span id="perc" class="stats-val text-blue">0%</span></span>
            <span id="size" class="stats-val">0.0 MB / 0.0 MB</span>
        </div>
        
        <div class="progress-bg"><div id="progress-bar" class="progress-fill"></div></div>
        
        <!-- Speed & ETA -->
        <div class="stats-row" style="margin-top: 10px;">
            <span>Speed: <span id="speed" class="stats-val">-- MB/s</span></span>
            <span>ETA: <span id="eta" class="stats-val">--</span></span>
        </div>
        
        <a id="dl-btn" class="btn btn-green" style="display:none;">💾 Save File</a>
        <button id="cancel-btn" class="btn btn-red" onclick="cancelTransfer()">✖ Cancel Transfer</button>
    </div>
</div>

<script>
    // --- PERFORMANCE TUNING CONSTANTS ---
    // 256KB chunks — 4× larger than before, fewer send() calls, less serialization overhead
    const CHUNK_SIZE = 256 * 1024;
    // Allow up to 16MB in the WebRTC send buffer before pausing (keeps the pipe full)
    const BUFFER_LIMIT = 16 * 1024 * 1024;
    // Resume sending once buffer drains below 1MB (event-driven, no polling)
    const BUFFER_RESUME = 1 * 1024 * 1024;
    // Pre-load files ≤500MB entirely into RAM — eliminates per-chunk disk I/O
    const PRELOAD_LIMIT = 500 * 1024 * 1024;
    // How many chunks to burst-send per loop iteration before checking the buffer again
    const BURST_COUNT = 120;

    // --- GLOBAL VARIABLES ---
    let peer, conn;
    let transferActive = false;
    let receivedChunks = [];
    let receivedSize = 0;
    let fileMetadata = null;

    // Stats tracking
    let lastStatsTime = 0;
    let lastStatsBytes = 0;

    // --- PEERJS CONNECTION LOGIC ---
    function startPeer() {
        const roomInput = document.getElementById('room-id').value.trim();
        if (!roomInput) {
            alert("Please enter a room code!");
            return;
        }

        document.getElementById('connect-btn').disabled = true;
        updateStatus("Connecting to server...", "waiting");

        // Try to become HOST (create the room)
        peer = new Peer('swiftdrop-room-' + roomInput);

        peer.on('open', () => {
            updateStatus(`Room '${roomInput}' created. Waiting for peer...`, "waiting");
            document.getElementById('setup-ui').style.display = 'none';
        });

        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                // Room exists — join as GUEST
                updateStatus("Room found. Joining...", "waiting");
                peer = new Peer();

                peer.on('open', () => {
                    // Explicit binary serialization — no JSON stringification overhead
                    const connection = peer.connect('swiftdrop-room-' + roomInput, {
                        reliable: true,
                        serialization: 'binary'
                    });
                    connection.on('open', () => setupConn(connection));
                });
            } else {
                updateStatus("Connection Error", "error");
                document.getElementById('connect-btn').disabled = false;
                alert("Error: " + err.message);
            }
        });

        // Host receives incoming connection
        peer.on('connection', (connection) => {
            if (conn) {
                connection.close();
                return;
            }
            setupConn(connection);
        });
    }

    // --- SETUP CONNECTION EVENTS ---
    function setupConn(connection) {
        conn = connection;
        updateStatus("Connected securely to peer!", "online");

        document.getElementById('setup-ui').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';

        conn.on('data', handleIncomingData);

        conn.on('close', () => {
            updateStatus("Peer disconnected.", "error");
            resetTransferUI();
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('setup-ui').style.display = 'block';
            document.getElementById('connect-btn').disabled = false;
            conn = null;
        });
    }

    // --- HANDLE INCOMING DATA (RECEIVER) ---
    function handleIncomingData(data) {
        // Metadata — transfer is starting
        if (data && data.type === 'start') {
            transferActive = true;
            fileMetadata = data;
            receivedChunks = [];
            receivedSize = 0;
            initStatsTracker();
            showTransferUI(data.name, "Receiving...");
            lockMainUI(true);
        }
        // File chunk — thin {d: ArrayBuffer} wrapper to minimize per-message overhead
        else if (data && data.d) {
            if (!transferActive) return;
            receivedChunks.push(data.d);
            receivedSize += data.d.byteLength;

            updateProgressAndStats(receivedSize, fileMetadata.size);

            if (receivedSize >= fileMetadata.size) {
                finishReceiving();
            }
        }
        // Cancellation signal from sender
        else if (data && data.type === 'cancel') {
            alert("The sender cancelled the file transfer.");
            resetTransferUI();
            lockMainUI(false);
        }
    }

    // --- SEND FILE LOGIC (SENDER) ---
    async function sendFile() {
        const fileInput = document.getElementById('file-input');
        const file = fileInput.files[0];

        if (!file || !conn || !conn.open) return;

        transferActive = true;
        lockMainUI(true);
        initStatsTracker();
        showTransferUI(file.name, "Sending...");

        // Tell receiver to prepare
        conn.send({ type: 'start', name: file.name, size: file.size, mime: file.type });

        // Configure event-driven backpressure on the raw DataChannel
        const dc = conn.dataChannel || conn._dc;
        if (dc) {
            dc.bufferedAmountLowThreshold = BUFFER_RESUME;
        }

        // Promise that resolves when the send buffer has drained enough
        const waitDrain = () => new Promise(resolve => {
            if (!dc || dc.bufferedAmount <= BUFFER_LIMIT) {
                resolve();
                return;
            }
            const handler = () => {
                dc.removeEventListener('bufferedamountlow', handler);
                resolve();
            };
            dc.addEventListener('bufferedamountlow', handler);
            // Safety fallback: if the event never fires (edge case), resolve after 200ms
            setTimeout(() => {
                dc.removeEventListener('bufferedamountlow', handler);
                resolve();
            }, 200);
        });

        // Pre-load entire file into RAM for zero disk-I/O during the send loop
        let fileBuffer = null;
        const useMemory = file.size <= PRELOAD_LIMIT;
        if (useMemory) {
            fileBuffer = await file.arrayBuffer();
        }

        let offset = 0;

        while (offset < file.size && transferActive) {
            await waitDrain();

            // Burst-send: fire as many chunks as possible before yielding
            let burst = 0;
            while (offset < file.size && transferActive && burst < BURST_COUNT) {
                if (dc && dc.bufferedAmount > BUFFER_LIMIT) break;

                let chunk;
                if (useMemory) {
                    // .slice() on an ArrayBuffer is a fast memory copy — no disk I/O
                    const end = Math.min(offset + CHUNK_SIZE, file.size);
                    chunk = fileBuffer.slice(offset, end);
                } else {
                    // Streaming fallback for very large files
                    const slice = file.slice(offset, offset + CHUNK_SIZE);
                    chunk = await slice.arrayBuffer();
                }

                // Thin wrapper: single-letter key to minimize BinaryPack framing overhead
                conn.send({ d: chunk });
                offset += chunk.byteLength;
                burst++;
            }

            updateProgressAndStats(offset, file.size);

            // Yield to the browser's UI thread so the progress bar stays responsive
            await new Promise(r => setTimeout(r, 0));
        }

        if (transferActive && offset >= file.size) {
            document.getElementById('cancel-btn').style.display = 'none';
            document.getElementById('transfer-mode').innerText = "✅ Sent Successfully";
            document.getElementById('speed').innerText = "--";
            document.getElementById('eta').innerText = "--";
            transferActive = false;
            setTimeout(() => lockMainUI(false), 2000);
        }

        fileInput.value = "";
        fileBuffer = null; // Release RAM immediately
    }

    // --- TRANSFER UI & STATS ---
    function initStatsTracker() {
        lastStatsTime = performance.now();
        lastStatsBytes = 0;
    }

    function updateProgressAndStats(currentBytes, totalBytes) {
        const percent = (currentBytes / totalBytes) * 100;
        document.getElementById('progress-bar').style.width = Math.min(percent, 100) + "%";
        document.getElementById('perc').innerText = Math.floor(percent) + "%";
        document.getElementById('size').innerText = `${formatBytes(currentBytes)} / ${formatBytes(totalBytes)}`;

        // Throttle speed/ETA to ~4 updates/sec for stable readings
        const now = performance.now();
        const timeDiff = now - lastStatsTime;

        if (timeDiff >= 250 || currentBytes === totalBytes) {
            const bytesDiff = currentBytes - lastStatsBytes;
            const speedBps = (bytesDiff / timeDiff) * 1000;

            document.getElementById('speed').innerText = `${formatBytes(speedBps)}/s`;

            const remainingBytes = totalBytes - currentBytes;
            const etaSeconds = speedBps > 0 ? (remainingBytes / speedBps) : 0;
            document.getElementById('eta').innerText = formatTime(etaSeconds);

            lastStatsBytes = currentBytes;
            lastStatsTime = now;
        }
    }

    function finishReceiving() {
        transferActive = false;

        const blob = new Blob(receivedChunks, { type: fileMetadata.mime });
        const url = URL.createObjectURL(blob);

        const dlBtn = document.getElementById('dl-btn');
        dlBtn.href = url;
        dlBtn.download = fileMetadata.name;
        dlBtn.style.display = 'flex';

        document.getElementById('cancel-btn').style.display = 'none';
        document.getElementById('transfer-mode').innerText = "✅ File Ready to Save";
        document.getElementById('speed').innerText = "--";
        document.getElementById('eta').innerText = "--";

        lockMainUI(false);
        receivedChunks = [];
    }

    // --- CANCELLATION & EXIT ---
    function cancelTransfer() {
        transferActive = false;
        if (conn && conn.open) {
            conn.send({ type: 'cancel' });
        }
        resetTransferUI();
        lockMainUI(false);
        document.getElementById('file-input').value = "";
    }

    function exitRoom() {
        if (confirm("Are you sure you want to leave the room?")) {
            if (peer) peer.destroy();
            location.reload();
        }
    }

    // --- UTILITIES ---
    function updateStatus(text, type) {
        const el = document.getElementById('status');
        el.innerText = text;
        el.className = "pill " + type;
    }

    function showTransferUI(name, mode) {
        document.getElementById('transfer-ui').style.display = 'block';
        document.getElementById('cancel-btn').style.display = 'block';
        document.getElementById('dl-btn').style.display = 'none';
        document.getElementById('file-name').innerText = name;
        document.getElementById('transfer-mode').innerText = mode;
        document.getElementById('progress-bar').style.width = "0%";
        document.getElementById('speed').innerText = "Calculating...";
        document.getElementById('eta').innerText = "Calculating...";
    }

    function resetTransferUI() {
        transferActive = false;
        receivedChunks = [];
        receivedSize = 0;
        document.getElementById('transfer-ui').style.display = 'none';
    }

    function lockMainUI(isLocked) {
        document.getElementById('select-file-btn').disabled = isLocked;
        document.getElementById('exit-btn').disabled = isLocked;
    }

    function formatBytes(bytes, decimals = 2) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const dm = decimals < 0 ? 0 : decimals;
        const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    }

    function formatTime(seconds) {
        if (!isFinite(seconds) || seconds < 0) return "--";
        if (seconds < 1) return "< 1s";
        seconds = Math.round(seconds);
        if (seconds < 60) return seconds + "s";
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return m + "m " + s + "s";
    }
</script>

</body>
</html>
