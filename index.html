<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Calculator</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(45deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .calculator { background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.5); width: 300px; }
        #display { width: 100%; height: 60px; border: none; background: rgba(255, 255, 255, 0.5); border-radius: 10px; font-size: 2rem; text-align: right; padding: 10px; box-sizing: border-box; margin-bottom: 20px; color: #333; outline: none; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { padding: 20px; border: none; background: rgba(255, 255, 255, 0.4); border-radius: 10px; font-size: 1.2rem; cursor: pointer; transition: 0.2s; color: #333; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        button:hover { background: rgba(255, 255, 255, 0.8); transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        .operator { background: rgba(255, 154, 158, 0.6); color: white; font-weight: bold; }
        .equal { grid-column: span 2; background: rgba(161, 196, 253, 0.6); color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" disabled>
    <div class="buttons">
        <button onclick="clearDisplay()" style="grid-column: span 2; background: rgba(255,255,255,0.7);">Clear</button>
        <button onclick="append(' / ')" class="operator">÷</button>
        <button onclick="append(' * ')" class="operator">×</button>
        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append(' - ')" class="operator">-</button>
        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append(' + ')" class="operator">+</button>
        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="calculate()" class="equal">=</button>
        <button onclick="append('0')" style="grid-column: span 2;">0</button>
        <button onclick="append('.')">.</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');
    function append(value) { display.value += value; }
    function clearDisplay() { display.value = ''; }
    function calculate() {
        try { display.value = eval(display.value); } 
        catch (e) { display.value = 'Error'; setTimeout(clearDisplay, 1500); }
    }
</script>

</body>
</html>
