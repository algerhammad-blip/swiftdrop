<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftDrop Pro - Robust Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --blue: #2563eb;
            --blue-hover: #1d4ed8;
            --bg: #f8fafc;
            --text: #0f172a;
            --text-light: #64748b;
            --green: #10b981;
            --green-hover: #059669;
            --red: #ef4444;
            --red-hover: #dc2626;
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            background: var(--card-bg);
            width: 90%;
            max-width: 480px;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
            box-sizing: border-box;
            transition: border 0.3s ease;
        }

        /* Drag & Drop Visuals */
        .card.dragover {
            border: 3px dashed var(--blue);
            background: #eff6ff;
        }

        h2 { text-align: center; color: var(--blue); margin-top: 0; font-size: 1.6rem; margin-bottom: 25px; }
        
        .status-box { text-align: center; margin-bottom: 25px; }
        .pill { 
            padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; 
            background: #f1f5f9; color: var(--text-light); display: inline-block; transition: all 0.3s ease;
        }
        .pill.online { background: #d1fae5; color: var(--green); }
        .pill.waiting { background: #fef3c7; color: #d97706; }
        .pill.error { background: #fee2e2; color: var(--red); }
        
        input[type="text"] {
            width: 100%; padding: 15px; border: 2px solid var(--border); border-radius: 12px;
            font-size: 1rem; box-sizing: border-box; outline: none; margin-bottom: 15px;
            text-align: center; font-weight: bold; letter-spacing: 2px;
        }
        input[type="text"]:focus { border-color: var(--blue); }
        
        .btn {
            width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: bold;
            font-size: 1rem; cursor: pointer; transition: all 0.2s; box-sizing: border-box;
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-blue { background: var(--blue); color: white; }
        .btn-blue:hover:not(:disabled) { background: var(--blue-hover); }
        
        .btn-red { background: var(--red); color: white; margin-top: 10px; }
        .btn-red:hover:not(:disabled) { background: var(--red-hover); }
        
        .btn-green { background: var(--green); color: white; text-decoration: none; margin-top: 15px; display: block; text-align: center; }
        .btn-green:hover:not(:disabled) { background: var(--green-hover); }

        .btn-exit { background: transparent; color: var(--text-light); border: 2px solid var(--border); margin-top: 15px; }
        .btn-exit:hover:not(:disabled) { background: #f8fafc; color: var(--text); }

        .transfer-box {
            background: #f8fafc; padding: 20px; border-radius: 16px; border: 1px solid var(--border);
            display: none; margin-top: 25px;
        }

        .file-info { display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; }
        #file-name { font-weight: bold; font-size: 1rem; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
        #transfer-mode { font-size: 0.75rem; color: var(--text-light); text-transform: uppercase; font-weight: bold; margin-top: 4px; letter-spacing: 1px; }
        
        .progress-bg { width: 100%; height: 14px; background: #e2e8f0; border-radius: 8px; overflow: hidden; margin: 15px 0; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--blue), #4facfe); transition: width 0.1s linear; border-radius: 8px; }
        
        .stats-row { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-light); margin-bottom: 5px; }
        .stats-val { font-weight: 600; color: var(--text); }
        .text-blue { color: var(--blue); }
    </style>
</head>
<body>

<div class="card" id="drop-zone">
    <div class="status-box"><span id="status" class="pill">Waiting to Connect...</span></div>
    <h2>🚀 SwiftDrop Pro</h2>
    
    <!-- ROOM SETUP -->
    <div id="setup-ui">
        <input type="text" id="room-id" placeholder="Enter Room Code (e.g. 1234)" autocomplete="off">
        <button class="btn btn-blue" onclick="startPeer()" id="connect-btn">🔗 Connect / Create Room</button>
    </div>

    <!-- MAIN LOBBY -->
    <div id="main-ui" style="display:none;">
        <input type="file" id="file-input" style="display:none" onchange="initiateSendFile()">
        <button class="btn btn-blue" id="select-file-btn" onclick="document.getElementById('file-input').click()">📤 Select File (or Drag & Drop)</button>
        <button class="btn btn-exit" id="exit-btn" onclick="exitRoom()">🚪 Exit Room</button>
    </div>

    <!-- TRANSFER UI -->
    <div id="transfer-ui" class="transfer-box">
        <div class="file-info">
            <div id="file-name">filename.mp4</div>
            <div id="transfer-mode">Initializing...</div>
        </div>
        
        <div class="stats-row">
            <span>Progress: <span id="perc" class="stats-val text-blue">0%</span></span>
            <span id="size" class="stats-val">0.0 MB / 0.0 MB</span>
        </div>
        
        <div class="progress-bg"><div id="progress-bar" class="progress-fill"></div></div>
        
        <div class="stats-row" style="margin-top: 10px;">
            <span>Speed: <span id="speed" class="stats-val">-- MB/s</span></span>
            <span>ETA: <span id="eta" class="stats-val">--</span></span>
        </div>
        
        <a id="dl-btn" class="btn btn-green" style="display:none;">💾 Save File</a>
        <button id="cancel-btn" class="btn btn-red" onclick="cancelTransfer()">✖ Cancel Transfer</button>
    </div>
</div>

<script>
    // --- GLOBAL VARIABLES & CONSTANTS ---
    let peer, conn;
    let transferActive = false;
    let receivedChunks = [];
    let fileMetadata = null;
    let receivedSize = 0;
    let fileToSend = null; // Holds file pending the handshake
    
    // SAFE LIMITS (Crucial for preventing Chrome/Firefox WebRTC crashes)
    const CHUNK_SIZE = 64 * 1024; // 64KB (Maximum safe size for WebRTC cross-browser)
    const BUFFER_LIMIT = 8 * 1024 * 1024; // 8MB Burst Limit
    const BUFFER_RECOVERY = 2 * 1024 * 1024; // Wait for buffer to drain to 2MB before bursting again

    // Stats variables
    let lastStatsTime = 0;
    let lastStatsBytes = 0;
    let lastUIUpdateTime = 0;

    // --- DRAG AND DROP LOGIC ---
    const dropZone = document.getElementById('drop-zone');
    
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        window.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

    window.addEventListener('dragover', () => {
        if(conn && conn.open && !transferActive) dropZone.classList.add('dragover');
    });

    window.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    
    window.addEventListener('drop', (e) => {
        dropZone.classList.remove('dragover');
        if (!conn || !conn.open || transferActive) return;
        
        const droppedFiles = e.dataTransfer.files;
        if (droppedFiles.length > 0) {
            document.getElementById('file-input').files = droppedFiles;
            initiateSendFile();
        }
    });

    // --- PEERJS CONNECTION LOGIC ---
    function startPeer() {
        const roomInput = document.getElementById('room-id').value.trim();
        if (!roomInput) return alert("Please enter a room code!");

        document.getElementById('connect-btn').disabled = true;
        updateStatus("Connecting to server...", "waiting");
        
        // Add Google STUN servers for maximum connectivity success
        const peerOptions = {
            config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:global.stun.twilio.com:3478' }] }
        };

        peer = new Peer('swiftdrop-room-' + roomInput, peerOptions);

        peer.on('open', () => {
            updateStatus(`🟢 Room '${roomInput}' active. Waiting for peer...`, "waiting");
            document.getElementById('setup-ui').style.display = 'none';
        });

        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                updateStatus("🟡 Room found. Joining...", "waiting");
                peer = new Peer(peerOptions); 
                peer.on('open', () => {
                    const connection = peer.connect('swiftdrop-room-' + roomInput, { reliable: true });
                    connection.on('open', () => setupConn(connection));
                });
            } else {
                updateStatus("🔴 Connection Error", "error");
                document.getElementById('connect-btn').disabled = false;
                alert("Error: " + err.message);
            }
        });

        peer.on('connection', (connection) => {
            if (conn) { connection.close(); return; } // Deny 3rd connections
            setupConn(connection);
        });
    }

    function setupConn(connection) {
        conn = connection;
        updateStatus("🟢 Connected securely!", "online");
        
        document.getElementById('setup-ui').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';

        conn.on('data', handleIncomingData);

        conn.on('close', () => {
            updateStatus("🔴 Peer disconnected.", "error");
            resetTransferUI();
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('setup-ui').style.display = 'block';
            document.getElementById('connect-btn').disabled = false;
            conn = null;
        });
    }

    // --- HANDLE INCOMING DATA (RECEIVER & HANDSHAKE LOOP) ---
    function handleIncomingData(data) {
        // Is it a raw binary chunk? (The actual file data)
        const isBinary = data instanceof ArrayBuffer || data instanceof Uint8Array || data instanceof Blob;

        if (isBinary) {
            if (!transferActive) return;
            
            receivedChunks.push(data);
            receivedSize += data.byteLength || data.size || data.length;

            const now = Date.now();
            if (now - lastUIUpdateTime > 100 || receivedSize >= fileMetadata.size) {
                updateProgressAndStats(receivedSize, fileMetadata.size);
                lastUIUpdateTime = now;
            }

            if (receivedSize >= fileMetadata.size) finishReceiving();
        } 
        else if (typeof data === 'object' && data !== null) {
            // STEP 1: Receiver gets metadata, prepares RAM, and tells sender "Ready!"
            if (data.type === 'start') {
                transferActive = true;
                fileMetadata = data;
                receivedChunks = [];
                receivedSize = 0;
                
                initStatsTracker();
                showTransferUI(data.name, "Receiving...");
                lockMainUI(true);
                
                // IMPORTANT: Tell sender we are ready to receive data
                conn.send({ type: 'ready' });
            } 
            // STEP 2: Sender receives "Ready!" and begins blasting binary data
            else if (data.type === 'ready') {
                beginStreamingFile();
            }
            // Transfer cancelled by peer
            else if (data.type === 'cancel') {
                alert("The other peer cancelled the transfer.");
                resetTransferUI();
                lockMainUI(false);
            }
        }
    }

    // --- SEND FILE LOGIC (SENDER LOOP) ---
    function initiateSendFile() {
        const fileInput = document.getElementById('file-input');
        fileToSend = fileInput.files[0];
        
        if (!fileToSend || !conn || !conn.open) return;

        transferActive = true;
        lockMainUI(true);
        initStatsTracker();
        showTransferUI(fileToSend.name, "Waiting for receiver...");
        
        // Initiate Handshake
        conn.send({ type: 'start', name: fileToSend.name, size: fileToSend.size, mime: fileToSend.type });
    }

    async function beginStreamingFile() {
        if (!fileToSend || !transferActive) return;
        
        document.getElementById('transfer-mode').innerText = "Sending...";
        let offset = 0;
        lastUIUpdateTime = Date.now();

        while (offset < fileToSend.size && transferActive) {
            // SMART BURST BUFFERING
            if (conn.dataChannel.bufferedAmount > BUFFER_LIMIT) {
                // Sleep until network stack clears the buffer down to safe levels
                while(conn.dataChannel.bufferedAmount > BUFFER_RECOVERY && transferActive && conn.open) {
                    await new Promise(resolve => setTimeout(resolve, 5));
                }
            }

            const chunk = fileToSend.slice(offset, offset + CHUNK_SIZE);
            const buffer = await chunk.arrayBuffer();
            
            if (!transferActive) break; 

            conn.send(buffer);
            offset += buffer.byteLength;
            
            const now = Date.now();
            if (now - lastUIUpdateTime > 100) {
                updateProgressAndStats(offset, fileToSend.size);
                lastUIUpdateTime = Date.now();
            }
        }

        if (transferActive && offset >= fileToSend.size) {
            updateProgressAndStats(fileToSend.size, fileToSend.size); 
            document.getElementById('cancel-btn').style.display = 'none';
            document.getElementById('transfer-mode').innerText = "✅ Sent Successfully";
            document.getElementById('speed').innerText = "--";
            document.getElementById('eta').innerText = "--";
            transferActive = false;
            fileToSend = null;
            document.getElementById('file-input').value = "";
            
            setTimeout(() => { lockMainUI(false); }, 2000); 
        }
    }

    // --- TRANSFER UI & STATS LOGIC ---
    function initStatsTracker() {
        lastStatsTime = Date.now();
        lastStatsBytes = 0;
        lastUIUpdateTime = Date.now();
    }

    function updateProgressAndStats(currentBytes, totalBytes) {
        let percent = (currentBytes / totalBytes) * 100;
        document.getElementById('progress-bar').style.width = Math.min(percent, 100) + "%";
        document.getElementById('perc').innerText = Math.floor(percent) + "%";
        document.getElementById('size').innerText = `${formatBytes(currentBytes)} / ${formatBytes(totalBytes)}`;

        const now = Date.now();
        const timeDiff = now - lastStatsTime;
        
        if (timeDiff >= 500 || currentBytes === totalBytes) {
            const bytesDiff = currentBytes - lastStatsBytes;
            const speedBps = (bytesDiff / timeDiff) * 1000; 
            
            document.getElementById('speed').innerText = `${formatBytes(speedBps)}/s`;
            
            const remainingBytes = totalBytes - currentBytes;
            const etaSeconds = speedBps > 0 ? (remainingBytes / speedBps) : 0;
            document.getElementById('eta').innerText = formatTime(etaSeconds);

            lastStatsBytes = currentBytes;
            lastStatsTime = now;
        }
    }

    function finishReceiving() {
        transferActive = false;
        
        const blob = new Blob(receivedChunks, { type: fileMetadata.mime });
        const url = URL.createObjectURL(blob);
        
        const dlBtn = document.getElementById('dl-btn');
        dlBtn.href = url;
        dlBtn.download = fileMetadata.name;
        dlBtn.style.display = 'block';
        
        document.getElementById('cancel-btn').style.display = 'none';
        document.getElementById('transfer-mode').innerText = "✅ File Ready to Save";
        document.getElementById('speed').innerText = "--";
        document.getElementById('eta').innerText = "--";
        
        lockMainUI(false); 
        
        // Instantly free memory (Crucial for large files)
        receivedChunks = []; 
        receivedSize = 0;
    }

    // --- CANCELLATION & EXIT CONTROLS ---
    function cancelTransfer() {
        transferActive = false;
        fileToSend = null;
        if (conn && conn.open) conn.send({ type: 'cancel' });
        resetTransferUI();
        lockMainUI(false);
        document.getElementById('file-input').value = ""; 
    }

    function exitRoom() {
        if (confirm("Are you sure you want to leave the room?")) {
            if (peer) peer.destroy();
            location.reload(); 
        }
    }

    // --- WARNING ON TAB CLOSE ---
    window.addEventListener("beforeunload", (e) => {
        if (transferActive) {
            e.preventDefault();
            e.returnValue = "Transfer in progress! Are you sure you want to leave?";
        }
    });

    // --- UTILITY & FORMATTING FUNCTIONS ---
    function updateStatus(text, type) {
        const statusEl = document.getElementById('status');
        statusEl.innerText = text;
        statusEl.className = "pill " + type;
    }

    function showTransferUI(name, mode) {
        document.getElementById('transfer-ui').style.display = 'block';
        document.getElementById('cancel-btn').style.display = 'block';
        document.getElementById('dl-btn').style.display = 'none';
        document.getElementById('file-name').innerText = name;
        document.getElementById('transfer-mode').innerText = mode;
        document.getElementById('progress-bar').style.width = "0%";
        document.getElementById('speed').innerText = "Calculating...";
        document.getElementById('eta').innerText = "Calculating...";
    }

    function resetTransferUI() {
        transferActive = false;
        document.getElementById('transfer-ui').style.display = 'none';
        receivedChunks = [];
        receivedSize = 0;
    }

    function lockMainUI(isLocked) {
        document.getElementById('select-file-btn').disabled = isLocked;
        document.getElementById('exit-btn').disabled = isLocked;
    }

    function formatBytes(bytes, decimals = 2) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024, dm = decimals < 0 ? 0 : decimals;
        const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    }

    function formatTime(seconds) {
        if (!isFinite(seconds) || seconds < 0) return "--";
        if (seconds < 1) return "< 1s";
        seconds = Math.round(seconds);
        if (seconds < 60) return seconds + "s";
        const m = Math.floor(seconds / 60), s = seconds % 60;
        return m + "m " + s + "s";
    }
</script>

</body>
</html>
