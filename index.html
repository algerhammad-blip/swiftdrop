<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ancient Temple Run</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0a0a05; font-family: 'Georgia', serif; touch-action: none; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; align-items: center; }
        #stats { position: absolute; top: 20px; right: 20px; color: #ffd700; font-size: 24px; text-align: right; text-shadow: 2px 2px 4px #000; }
        #menu { background: rgba(30, 20, 10, 0.9); padding: 40px; border: 4px solid #8b4513; border-radius: 0px; text-align: center; pointer-events: auto; margin-top: 15%; box-shadow: 0 0 50px #000; color: #deb887; }
        h1 { color: #ffd700; margin-top: 0; text-shadow: 3px 3px 0px #5d4037; font-size: 3.5rem; letter-spacing: 2px; text-transform: uppercase; }
        p { color: #fff; font-size: 1.1rem; line-height: 1.6; }
        .hint { color: #ffd700; font-weight: bold; }
        button { background: #8b4513; color: #ffd700; border: 2px solid #ffd700; padding: 15px 50px; font-size: 1.5rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 20px; text-transform: uppercase; }
        button:hover { background: #ffd700; color: #8b4513; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="stats">
            <div>METERS: <span id="score">0</span></div>
            <div>GOLD: <span id="coins">0</span></div>
        </div>
        <div id="menu">
            <h1 id="menu-title">Temple Escape</h1>
            <p>
                <span class="hint">UP:</span> JUMP OVER RUINS<br>
                <span class="hint">DOWN:</span> SLIDE UNDER LOGS<br>
                <span class="hint">SIDES:</span> DODGE PITFALLS
            </p>
            <button id="start-btn">Escape the Temple</button>
        </div>
    </div>

    <script>
        let isPlaying = false;
        let score = 0, coins = 0, speed = 0.7;
        const laneWidth = 3.5;
        let currentLane = 0;
        let isJumping = false, isSliding = false, yVelocity = 0;
        const gravity = 0.022;
        const jumpStrength = 0.48;

        // --- Scene & Camera ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050805); // Deep jungle night
        scene.fog = new THREE.FogExp2(0x050805, 0.015);
        
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 6, 12);
        camera.lookAt(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Lighting (Torch Theme) ---
        const ambient = new THREE.AmbientLight(0x404040, 0.5); 
        scene.add(ambient);

        const torchLight = new THREE.PointLight(0xffaa00, 2, 30);
        torchLight.position.set(0, 5, 5);
        scene.add(torchLight);

        // --- Player ---
        const playerGroup = new THREE.Group();
        const charMat = new THREE.MeshStandardMaterial({ color: 0xaa8866 });
        const charBody = new THREE.Mesh(new THREE.BoxGeometry(1, 1.6, 0.8), charMat);
        charBody.position.y = 0.8;
        playerGroup.add(charBody);
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), charMat);
        head.position.y = 1.9;
        playerGroup.add(head);
        scene.add(playerGroup);

        // --- Chaser (The Demon Monkey vibes) ---
        const stalker = new THREE.Group();
        const monsterMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const monsterBody = new THREE.Mesh(new THREE.BoxGeometry(3, 4, 2), monsterMat);
        stalker.add(monsterBody);
        const eyeGeo = new THREE.SphereGeometry(0.2);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const eyeL = new THREE.Mesh(eyeGeo, eyeMat); eyeL.position.set(-0.8, 1, 1);
        const eyeR = new THREE.Mesh(eyeGeo, eyeMat); eyeR.position.set(0.8, 1, 1);
        stalker.add(eyeL, eyeR);
        stalker.position.z = 18; // Following behind
        scene.add(stalker);

        // --- Track Building ---
        const trackGroup = new THREE.Group();
        scene.add(trackGroup);

        function createSegment(z) {
            const group = new THREE.Group();
            
            // Stone floor
            const floorGeo = new THREE.BoxGeometry(12, 1, 20);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.9 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.position.y = -0.5;
            group.add(floor);

            // Side Pillars
            const pillarGeo = new THREE.BoxGeometry(1, 6, 1);
            const pillarMat = new THREE.MeshStandardMaterial({ color: 0x332211 });
            const p1 = new THREE.Mesh(pillarGeo, pillarMat); p1.position.set(-6.5, 2.5, -5);
            const p2 = new THREE.Mesh(pillarGeo, pillarMat); p2.position.set(6.5, 2.5, -5);
            group.add(p1, p2);

            // Torch Flame (Visual)
            const flameGeo = new THREE.SphereGeometry(0.3);
            const flameMat = new THREE.MeshBasicMaterial({ color: 0xff6600 });
            const f1 = new THREE.Mesh(flameGeo, flameMat); f1.position.set(-5.8, 4.5, -5);
            group.add(f1);

            group.position.z = z;
            return group;
        }

        let segments = [];
        for(let i=0; i<10; i++) {
            let seg = createSegment(-i * 20);
            segments.push(seg);
            trackGroup.add(seg);
        }

        // --- Objects ---
        let objects = [];
        const stoneMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
        const woodMat = new THREE.MeshStandardMaterial({ color: 0x3d2b1f });
        const goldMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.8, roughness: 0.2 });

        function spawn() {
            if(!isPlaying) return;
            const lane = Math.floor(Math.random() * 3) - 1;
            const type = Math.random();
            let mesh;

            if (type < 0.2) { // Stone Hurdle (Jump)
                mesh = new THREE.Mesh(new THREE.BoxGeometry(3.2, 1.5, 1), stoneMat);
                mesh.position.set(lane * laneWidth, 0.75, -100);
                mesh.userData = { type: 'obs', h: 'low' };
            } else if (type < 0.4) { // Fallen Log (Slide)
                mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 4), woodMat);
                mesh.rotation.z = Math.PI/2;
                mesh.position.set(lane * laneWidth, 2.8, -100);
                mesh.userData = { type: 'obs', h: 'high' };
            } else { // Gold Idol
                mesh = new THREE.Mesh(new THREE.OctahedronGeometry(0.6), goldMat);
                mesh.position.set(lane * laneWidth, 1.2, -100);
                mesh.userData = { type: 'coin' };
            }

            scene.add(mesh);
            objects.push(mesh);
            setTimeout(spawn, Math.max(250, 1000 - speed * 100));
        }

        // --- Controls ---
        const moveL = () => { if(currentLane > -1) currentLane--; };
        const moveR = () => { if(currentLane < 1) currentLane++; };
        const jump = () => { if(!isJumping && !isSliding) { isJumping = true; yVelocity = jumpStrength; } };
        const slide = () => { 
            if(!isSliding && !isJumping) { 
                isSliding = true; 
                playerGroup.scale.y = 0.3; playerGroup.position.y = -0.4;
                setTimeout(() => { isSliding = false; playerGroup.scale.y = 1; playerGroup.position.y = 0; }, 800);
            }
        };

        window.addEventListener('keydown', e => {
            if(e.code === 'ArrowLeft') moveL(); if(e.code === 'ArrowRight') moveR();
            if(e.code === 'ArrowUp' || e.code === 'Space') jump(); if(e.code === 'ArrowDown') slide();
        });

        let tsX, tsY;
        window.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; });
        window.addEventListener('touchend', e => {
            let dx = e.changedTouches[0].clientX - tsX, dy = e.changedTouches[0].clientY - tsY;
            if(Math.abs(dx) > Math.abs(dy)) { if(dx > 30) moveR(); else if(dx < -30) moveL(); }
            else { if(dy < -30) jump(); else if(dy > 30) slide(); }
        });

        // --- Main Loop ---
        function animate() {
            requestAnimationFrame(animate);
            if(isPlaying) {
                score++;
                document.getElementById('score').innerText = Math.floor(score/10);
                speed += 0.0001;

                // Player Movement
                playerGroup.position.x += (currentLane * laneWidth - playerGroup.position.x) * 0.15;
                if(isJumping) {
                    playerGroup.position.y += yVelocity;
                    yVelocity -= gravity;
                    if(playerGroup.position.y <= 0) { playerGroup.position.y = 0; isJumping = false; }
                }

                // Stalker following & bobbing
                stalker.position.x = playerGroup.position.x;
                stalker.position.y = 2 + Math.sin(Date.now() * 0.01) * 0.5;

                // Torch flicker
                torchLight.intensity = 1.5 + Math.random() * 0.5;

                // Track and Objects
                segments.forEach(s => {
                    s.position.z += speed;
                    if(s.position.z > 20) s.position.z -= 200;
                });

                objects.forEach((obj, i) => {
                    obj.position.z += speed;
                    if(obj.userData.type === 'coin') obj.rotation.y += 0.05;

                    // Collision
                    if(Math.abs(obj.position.z - playerGroup.position.z) < 1 && Math.abs(obj.position.x - playerGroup.position.x) < 1.5) {
                        if(obj.userData.type === 'coin') {
                            coins++; document.getElementById('coins').innerText = coins;
                            scene.remove(obj); objects.splice(i, 1);
                        } else {
                            let hit = true;
                            if(obj.userData.h === 'low' && isJumping && playerGroup.position.y > 1.2) hit = false;
                            if(obj.userData.h === 'high' && isSliding) hit = false;
                            if(hit) gameOver();
                        }
                    }
                    if(obj.position.z > 15) { scene.remove(obj); objects.splice(i, 1); }
                });
            }
            renderer.render(scene, camera);
        }

        function startGame() {
            document.getElementById('menu').style.display = 'none';
            score = 0; coins = 0; speed = 0.7; currentLane = 0;
            objects.forEach(o => scene.remove(o)); objects = [];
            isPlaying = true;
            spawn();
        }

        function gameOver() {
            isPlaying = false;
            document.getElementById('menu').style.display = 'block';
            document.getElementById('menu-title').innerText = "Caught!";
            document.getElementById('start-btn').innerText = "Try Again";
        }

        document.getElementById('start-btn').addEventListener('click', startGame);
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
