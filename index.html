<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Temple Run</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050510; font-family: 'Courier New', Courier, monospace; touch-action: none; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; align-items: center; }
        #stats { position: absolute; top: 20px; left: 20px; color: #00ffff; font-size: 20px; text-shadow: 0 0 10px #00ffff; pointer-events: none; }
        #menu { background: rgba(0, 0, 0, 0.9); padding: 40px; border: 3px solid #00ffff; border-radius: 20px; text-align: center; pointer-events: auto; margin-top: 15%; box-shadow: 0 0 30px #00ffff; }
        h1 { color: #00ffff; margin-top: 0; text-shadow: 0 0 15px #00ffff; font-size: 3rem; letter-spacing: 5px; }
        p { color: #fff; font-size: 1.1rem; line-height: 1.6; }
        .controls-hint { color: #ff00ff; font-weight: bold; }
        button { background: #ff00ff; color: #fff; border: none; padding: 15px 50px; font-size: 1.5rem; font-weight: bold; border-radius: 5px; cursor: pointer; box-shadow: 0 0 15px #ff00ff; transition: 0.3s; margin-top: 20px; }
        button:hover { background: #fff; color: #ff00ff; transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="stats">
            <div>SCORE: <span id="score">0</span></div>
            <div>COINS: <span id="coins">0</span></div>
        </div>
        <div id="menu">
            <h1 id="menu-title">NEON TEMPLE</h1>
            <p>
                <span class="controls-hint">W / SPACE / SWIPE UP:</span> JUMP<br>
                <span class="controls-hint">S / SWIPE DOWN:</span> SLIDE<br>
                <span class="controls-hint">A/D / SWIPE SIDES:</span> MOVE
            </p>
            <p>Avoid red hazards. Collect yellow gems.</p>
            <button id="start-btn">RUN</button>
        </div>
    </div>

    <script>
        // --- Configuration & State ---
        let isPlaying = false;
        let score = 0;
        let coins = 0;
        let speed = 0.6;
        const laneWidth = 3.5;
        let currentLane = 0; // -1, 0, 1
        
        // Physics
        let isJumping = false;
        let isSliding = false;
        let yVelocity = 0;
        const gravity = 0.025;
        const jumpStrength = 0.45;

        // Scene Setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050510, 0.012);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);
        const pointLight = new THREE.PointLight(0x00ffff, 1, 100);
        pointLight.position.set(0, 10, 5);
        scene.add(pointLight);

        // --- Player Creation ---
        const playerGroup = new THREE.Group();
        const bodyGeo = new THREE.BoxGeometry(1, 1.5, 1);
        const bodyMat = new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x004444 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0.75;
        playerGroup.add(body);

        // Head
        const headGeo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
        const head = new THREE.Mesh(headGeo, bodyMat);
        head.position.y = 1.8;
        playerGroup.add(head);

        scene.add(playerGroup);

        // --- Track & Environment ---
        const trackGroup = new THREE.Group();
        scene.add(trackGroup);

        function createTrackSegment(z) {
            const geo = new THREE.PlaneGeometry(12, 20);
            const mat = new THREE.MeshPhongMaterial({ color: 0x111122, side: THREE.DoubleSide });
            const segment = new THREE.Mesh(geo, mat);
            segment.rotation.x = Math.PI / 2;
            segment.position.z = z;
            
            // Lane Lines
            const lineGeo = new THREE.PlaneGeometry(0.1, 20);
            const lineMat = new THREE.MeshBasicMaterial({ color: 0x333355 });
            const line1 = new THREE.Mesh(lineGeo, lineMat);
            line1.position.set(-laneWidth/2, -0.01, 0);
            segment.add(line1);
            const line2 = new THREE.Mesh(lineGeo, lineMat);
            line2.position.set(laneWidth/2, -0.01, 0);
            segment.add(line2);

            return segment;
        }

        // Initialize track
        let trackSegments = [];
        for(let i=0; i<10; i++) {
            let seg = createTrackSegment(-i * 20);
            trackGroup.add(seg);
            trackSegments.push(seg);
        }

        // --- Obstacles & Items ---
        let objects = []; // Obstacles and Coins
        const obstacleMat = new THREE.MeshPhongMaterial({ color: 0xff0055, emissive: 0x440011 });
        const coinGeo = new THREE.OctahedronGeometry(0.5);
        const coinMat = new THREE.MeshPhongMaterial({ color: 0xffff00, emissive: 0x444400 });

        function spawnObject() {
            if (!isPlaying) return;

            const type = Math.random();
            const lane = Math.floor(Math.random() * 3) - 1;
            let mesh;

            if (type < 0.2) { // High Obstacle (Must Slide)
                mesh = new THREE.Mesh(new THREE.BoxGeometry(3, 1.5, 1), obstacleMat);
                mesh.position.set(lane * laneWidth, 2.5, -100);
                mesh.userData = { type: 'obstacle', height: 'high' };
            } else if (type < 0.5) { // Low Obstacle (Must Jump)
                mesh = new THREE.Mesh(new THREE.BoxGeometry(3, 1.2, 1), obstacleMat);
                mesh.position.set(lane * laneWidth, 0.6, -100);
                mesh.userData = { type: 'obstacle', height: 'low' };
            } else { // Coin
                mesh = new THREE.Mesh(coinGeo, coinMat);
                mesh.position.set(lane * laneWidth, 1, -100);
                mesh.userData = { type: 'coin' };
            }

            scene.add(mesh);
            objects.push(mesh);

            let nextDelay = Math.max(300, 1200 - (score * 0.5));
            setTimeout(spawnObject, nextDelay);
        }

        // --- Input Handling ---
        function moveLeft() { if (currentLane > -1) currentLane--; }
        function moveRight() { if (currentLane < 1) currentLane++; }
        function jump() { 
            if (!isJumping && !isSliding) {
                isJumping = true;
                yVelocity = jumpStrength;
            }
        }
        function slide() {
            if (!isSliding && !isJumping) {
                isSliding = true;
                playerGroup.scale.y = 0.4;
                playerGroup.position.y = -0.3;
                setTimeout(() => {
                    isSliding = false;
                    playerGroup.scale.y = 1.0;
                    playerGroup.position.y = 0;
                }, 700);
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') moveLeft();
            if (e.code === 'ArrowRight' || e.code === 'KeyD') moveRight();
            if (e.code === 'ArrowUp' || e.code === 'Space' || e.code === 'KeyW') jump();
            if (e.code === 'ArrowDown' || e.code === 'KeyS') slide();
        });

        // Swipe logic
        let tsX, tsY;
        window.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; });
        window.addEventListener('touchend', e => {
            let dx = e.changedTouches[0].clientX - tsX;
            let dy = e.changedTouches[0].clientY - tsY;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30) moveRight(); else if (dx < -30) moveLeft();
            } else {
                if (dy < -30) jump(); else if (dy > 30) slide();
            }
        });

        // --- Core Loop ---
        function animate() {
            requestAnimationFrame(animate);

            if (isPlaying) {
                score++;
                document.getElementById('score').innerText = Math.floor(score/10);
                speed += 0.0001;

                // Move Player
                const targetX = currentLane * laneWidth;
                playerGroup.position.x += (targetX - playerGroup.position.x) * 0.15;

                // Jump Physics
                if (isJumping) {
                    playerGroup.position.y += yVelocity;
                    yVelocity -= gravity;
                    if (playerGroup.position.y <= 0) {
                        playerGroup.position.y = 0;
                        isJumping = false;
                    }
                }

                // Move Track (Infinite illusion)
                trackSegments.forEach(seg => {
                    seg.position.z += speed;
                    if (seg.position.z > 20) {
                        seg.position.z -= 200;
                    }
                });

                // Handle Objects (Obstacles/Coins)
                for (let i = objects.length - 1; i >= 0; i--) {
                    const obj = objects[i];
                    obj.position.z += speed;

                    // Rotation for coins
                    if (obj.userData.type === 'coin') obj.rotation.y += 0.1;

                    // Collision detection
                    const dx = Math.abs(obj.position.x - playerGroup.position.x);
                    const dz = Math.abs(obj.position.z - playerGroup.position.z);
                    
                    if (dz < 1.0 && dx < 1.5) {
                        if (obj.userData.type === 'obstacle') {
                            // Check if player is safely under/over
                            let safe = false;
                            if (obj.userData.height === 'high' && isSliding) safe = true;
                            if (obj.userData.height === 'low' && isJumping && playerGroup.position.y > 1.0) safe = true;
                            
                            if (!safe) gameOver();
                        } else if (obj.userData.type === 'coin') {
                            coins++;
                            document.getElementById('coins').innerText = coins;
                            scene.remove(obj);
                            objects.splice(i, 1);
                            continue;
                        }
                    }

                    // Cleanup
                    if (obj.position.z > 15) {
                        scene.remove(obj);
                        objects.splice(i, 1);
                    }
                }
            }

            renderer.render(scene, camera);
        }

        function startGame() {
            document.getElementById('menu').style.display = 'none';
            score = 0;
            coins = 0;
            speed = 0.6;
            currentLane = 0;
            isPlaying = true;
            
            // Clear existing objects
            objects.forEach(o => scene.remove(o));
            objects = [];
            
            spawnObject();
        }

        function gameOver() {
            isPlaying = false;
            document.getElementById('menu').style.display = 'block';
            document.getElementById('menu-title').innerText = "WASTED";
            document.getElementById('start-btn').innerText = "TRY AGAIN";
        }

        document.getElementById('start-btn').addEventListener('click', startGame);
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
