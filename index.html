<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Clone</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            touch-action: none; /* Prevents pull-to-refresh on mobile */
        }
        canvas {
            background-color: #70c5ce; /* Sky blue */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 4px solid #fff;
            border-radius: 8px;
            max-width: 100%;
            max-height: 100vh;
        }
    </style>
</head>
<body>

    <!-- Canvas resolution is fixed to maintain consistent physics -->
    <canvas id="gameCanvas" width="320" height="480"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game State Variables
        let frames = 0;
        let score = 0;
        let bestScore = localStorage.getItem('flappyBestScore') || 0;
        let currentPhase = 0; // 0: Start Screen, 1: Playing, 2: Game Over

        // The Bird Object
        const bird = {
            x: 60,
            y: 150,
            radius: 12,
            velocity: 0,
            gravity: 0.6,
            jump: -7.5,
            draw() {
                // Draw Bird Body
                ctx.fillStyle = '#f1c40f'; 
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Draw Eye
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(this.x + 4, this.y - 4, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(this.x + 5, this.y - 4, 1.5, 0, Math.PI * 2);
                ctx.fill();

                // Draw Beak
                ctx.fillStyle = '#e67e22';
                ctx.beginPath();
                ctx.moveTo(this.x + 8, this.y);
                ctx.lineTo(this.x + 18, this.y + 3);
                ctx.lineTo(this.x + 8, this.y + 6);
                ctx.fill();
                ctx.stroke();
            },
            flap() {
                this.velocity = this.jump;
            },
            update() {
                this.velocity += this.gravity;
                this.y += this.velocity;
                
                // Hit the floor
                if (this.y + this.radius >= canvas.height - 20) {
                    this.y = canvas.height - 20 - this.radius;
                    currentPhase = 2; // Game Over
                }
                // Hit the ceiling
                if (this.y - this.radius <= 0) {
                    this.y = this.radius;
                    this.velocity = 0;
                }
            },
            reset() {
                this.y = 150;
                this.velocity = 0;
            }
        };

        // The Pipes Object
        const pipes = {
            items: [],
            width: 50,
            gap: 130, // Space between top and bottom pipe
            dx: 3,    // Speed of pipes moving left
            draw() {
                for (let i = 0; i < this.items.length; i++) {
                    let p = this.items[i];
                    ctx.fillStyle = '#2ecc71'; 
                    ctx.lineWidth = 2;
                    
                    // Top pipe
                    ctx.fillRect(p.x, 0, this.width, p.top);
                    ctx.strokeRect(p.x, 0, this.width, p.top);
                    
                    // Bottom pipe
                    let bottomY = p.top + this.gap;
                    let bottomHeight = canvas.height - bottomY - 20;
                    ctx.fillRect(p.x, bottomY, this.width, bottomHeight);
                    ctx.strokeRect(p.x, bottomY, this.width, bottomHeight);
                }
            },
            update() {
                // Spawn a new pipe every 80 frames
                if (frames % 80 === 0) {
                    this.items.push({
                        x: canvas.width,
                        top: Math.random() * (canvas.height - this.gap - 80) + 20,
                        passed: false
                    });
                }
                for (let i = 0; i < this.items.length; i++) {
                    let p = this.items[i];
                    p.x -= this.dx;

                    // Collision Detection (Bird hitting pipes)
                    let birdLeft = bird.x - bird.radius;
                    let birdRight = bird.x + bird.radius;
                    let birdTop = bird.y - bird.radius;
                    let birdBottom = bird.y + bird.radius;

                    if (birdRight > p.x && birdLeft < p.x + this.width) {
                        if (birdTop < p.top || birdBottom > p.top + this.gap) {
                            currentPhase = 2; // Hit a pipe!
                        }
                    }

                    // Score increment (Passing a pipe)
                    if (p.x + this.width < birdLeft && !p.passed) {
                        score++;
                        p.passed = true;
                    }

                    // Remove pipes that went off-screen
                    if (p.x + this.width < 0) {
                        this.items.shift();
                        i--;
                    }
                }
            },
            reset() {
                this.items = [];
            }
        };

        // UI & Scenery Drawing Functions
        function drawFloor() {
            ctx.fillStyle = '#ded895';
            ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
            ctx.fillStyle = '#73bf2e';
            ctx.fillRect(0, canvas.height - 25, canvas.width, 5);
        }

        function drawUI() {
            ctx.fillStyle = '#FFF';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 3;
            
            if (currentPhase === 0) {
                ctx.font = "bold 24px 'Courier New'";
                ctx.strokeText("TAP TO START", 70, canvas.height/2);
                ctx.fillText("TAP TO START", 70, canvas.height/2);
            } else if (currentPhase === 1) {
                ctx.font = "bold 40px 'Courier New'";
                ctx.strokeText(score, canvas.width/2 - 15, 60);
                ctx.fillText(score, canvas.width/2 - 15, 60);
            } else if (currentPhase === 2) {
                ctx.font = "bold 35px 'Courier New'";
                ctx.strokeText("GAME OVER", 65, canvas.height/2 - 40);
                ctx.fillText("GAME OVER", 65, canvas.height/2 - 40);
                
                ctx.font = "bold 20px 'Courier New'";
                ctx.strokeText(`Score: ${score}`, 110, canvas.height/2 + 10);
                ctx.fillText(`Score: ${score}`, 110, canvas.height/2 + 10);
                
                ctx.strokeText(`Best: ${bestScore}`, 115, canvas.height/2 + 40);
                ctx.fillText(`Best: ${bestScore}`, 115, canvas.height/2 + 40);
                
                ctx.font = "bold 16px 'Courier New'";
                ctx.strokeText("Tap to Restart", 90, canvas.height/2 + 90);
                ctx.fillText("Tap to Restart", 90, canvas.height/2 + 90);
            }
        }

        // Main Game Loop
        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            pipes.draw();
            drawFloor();
            bird.draw();
            drawUI();

            if (currentPhase === 1) {
                bird.update();
                pipes.update();
                frames++;
            } else if (currentPhase === 2) {
                // Update High Score
                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('flappyBestScore', bestScore);
                }
                // Make the bird fall to the ground when dead
                if (bird.y + bird.radius < canvas.height - 20) {
                    bird.velocity += bird.gravity;
                    bird.y += bird.velocity;
                }
            }

            requestAnimationFrame(loop);
        }

        // Input Handling
        function handleInput() {
            if (currentPhase === 0) {
                currentPhase = 1; // Start Game
                bird.flap();
            } else if (currentPhase === 1) {
                bird.flap();      // Jump
            } else if (currentPhase === 2 && bird.y + bird.radius >= canvas.height - 20) {
                // Only allow restart after bird hits the ground
                frames = 0;
                score = 0;
                bird.reset();
                pipes.reset();
                currentPhase = 0;
            }
        }

        // Listeners for Desktop and Mobile
        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space' || e.code === 'ArrowUp') handleInput();
        });
        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevents mobile screen zooming/scrolling
            handleInput();
        }, {passive: false});

        // Start Loop
        loop();
    </script>
</body>
</html>
