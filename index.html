<script>
    let peer, conn;
    let transferActive = false;
    const CHUNK_SIZE = 16384 * 4; // 64KB

    function startPeer() {
        const room = document.getElementById('room-id').value;
        if (!room) return alert("Enter code");
        document.getElementById('status').innerText = "Connecting...";
        
        peer = new Peer('sd-room-' + room);

        peer.on('open', () => {
            // Room created, but NO ONE is here yet.
            // Do NOT show the send button yet.
            updateStatus("🟢 Room Active: Waiting for peer to join...", true);
            document.getElementById('setup-ui').style.display = 'none';
        });

        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                // Room exists! Let's join as a client.
                updateStatus("🟡 Joining room...", true);
                peer = new Peer(); 
                peer.on('open', () => {
                    const c = peer.connect('sd-room-' + room, {reliable: true});
                    // Wait for connection to fully open before showing UI
                    c.on('open', () => setupConn(c));
                });
            } else {
                updateStatus("🔴 Error: " + err.type, false);
            }
        });

        peer.on('connection', (c) => {
            // A client just joined our room!
            setupConn(c);
        });
    }

    function setupConn(c) {
        conn = c;
        updateStatus("🟢 Connected to Peer! Ready.", true);
        document.getElementById('setup-ui').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block'; // Show Send Button NOW

        let chunks = [];
        let meta = null;

        conn.on('data', (data) => {
            if (data.type === 'start') {
                transferActive = true;
                meta = data;
                chunks = [];
                showTransferUI(data.name, "Receiving...");
            } else if (data.type === 'chunk') {
                if (!transferActive) return;
                chunks.push(data.data);
                
                let receivedSize = chunks.length * CHUNK_SIZE;
                let progress = (receivedSize / meta.size) * 100;
                updateProgress(progress, receivedSize, meta.size);

                if (receivedSize >= meta.size) {
                    const blob = new Blob(chunks);
                    const url = URL.createObjectURL(blob);
                    const dl = document.getElementById('dl-btn');
                    dl.href = url;
                    dl.download = meta.name;
                    dl.style.display = 'block';
                    document.getElementById('cancel-btn').style.display = 'none';
                    updateStatus("📦 File Received", true);
                    transferActive = false;
                }
            } else if (data.type === 'cancel') {
                transferActive = false;
                document.getElementById('transfer-ui').style.display = 'none';
                alert("The other person cancelled the transfer.");
            }
        });

        conn.on('close', () => {
            updateStatus("🔴 Peer Left", false);
            document.getElementById('transfer-ui').style.display = 'none';
            document.getElementById('main-ui').style.display = 'none';
        });
    }

    async function sendFile() {
        const fileInput = document.getElementById('file-input');
        const file = fileInput.files[0];
        if (!file) return;
        
        if (!conn || !conn.open) {
            alert("Connection is not ready yet!");
            return;
        }

        transferActive = true;
        showTransferUI(file.name, "Sending...");
        
        conn.send({ type: 'start', name: file.name, size: file.size });

        let offset = 0;
        while (offset < file.size && transferActive) {
            // CRITICAL: Prevent WebRTC buffer overflow
            if (conn.dataChannel && conn.dataChannel.bufferedAmount > 1024 * 1024 * 2) { 
                await new Promise(r => setTimeout(r, 50)); 
                continue; 
            }

            const chunk = file.slice(offset, offset + CHUNK_SIZE);
            const buffer = await chunk.arrayBuffer();
            conn.send({ type: 'chunk', data: buffer });
            
            offset += CHUNK_SIZE;
            
            let progress = (offset / file.size) * 100;
            if (offset % (CHUNK_SIZE * 5) === 0 || offset >= file.size) {
                updateProgress(progress, offset, file.size);
            }

            await new Promise(r => setTimeout(r, 0));
        }

        if (transferActive) {
            updateStatus("✅ Sent Successfully", true);
            document.getElementById('cancel-btn').style.display = 'none';
            transferActive = false;
        }
        
        // Reset file input so user can send the same file again if needed
        fileInput.value = "";
    }

    function cancelTransfer() {
        transferActive = false;
        if (conn) conn.send({ type: 'cancel' });
        document.getElementById('transfer-ui').style.display = 'none';
        document.getElementById('file-input').value = ""; 
    }

    function exitRoom() {
        if(peer) peer.destroy();
        location.reload(); 
    }

    function updateStatus(txt, isOnline) {
        const s = document.getElementById('status');
        s.innerText = txt;
        s.className = isOnline ? "pill online" : "pill";
    }

    function showTransferUI(name, mode) {
        document.getElementById('transfer-ui').style.display = 'block';
        document.getElementById('cancel-btn').style.display = 'block';
        document.getElementById('file-name').innerText = name;
        document.getElementById('transfer-mode').innerText = mode;
        document.getElementById('dl-btn').style.display = 'none';
        document.getElementById('progress-bar').style.width = "0%";
    }

    function updateProgress(p, cur, tot) {
        p = Math.min(p, 100);
        document.getElementById('progress-bar').style.width = p + "%";
        document.getElementById('perc').innerText = Math.round(p) + "%";
        document.getElementById('size').innerText = (cur/1024/1024).toFixed(1) + "MB / " + (tot/1024/1024).toFixed(1) + "MB";
    }
</script>
