<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftDrop P2P Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --blue: #1a7fe0; --bg: #f8fbff; --text: #0d1b2a; --green: #00b96b; --red: #e03e3e; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; width: 90%; max-width: 450px; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid #e2e8f0; }
        h2 { text-align: center; color: var(--blue); margin-top: 0; }
        
        .status-box { text-align: center; margin-bottom: 20px; }
        .pill { padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; background: #eee; }
        .online { background: #e6f9f1; color: var(--green); }
        
        input { width: 100%; padding: 14px; border: 2px solid #edf2f7; border-radius: 12px; font-size: 1rem; box-sizing: border-box; outline: none; margin-bottom: 10px; }
        input:focus { border-color: var(--blue); }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-red { background: white; color: var(--red); border: 2px solid #fecaca; }
        .btn-exit { background: transparent; color: #64748b; border: 1.5px solid #e2e8f0; font-size: 0.8rem; margin-top: 20px;}
        .btn:active { transform: scale(0.98); }

        .transfer-box { background: #f1f5f9; padding: 15px; border-radius: 16px; display: none; margin-top: 20px; }
        .progress-bg { width: 100%; height: 12px; background: #cbd5e1; border-radius: 6px; overflow: hidden; margin: 10px 0; border: 1px solid #cbd5e1; }
        .progress-fill { width: 0%; height: 100%; background: var(--blue); transition: width 0.1s; }
        
        #dl-btn { background: var(--green); color: white; text-decoration: none; display: none; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <div class="status-box"><span id="status" class="pill">Waiting for Room Code...</span></div>
    <h2>🚀 SwiftDrop P2P</h2>
    
    <!-- ROOM SETUP -->
    <div id="setup-ui">
        <input type="text" id="room-id" placeholder="Enter Room Code (e.g. 1234)">
        <button class="btn btn-blue" onclick="startPeer()">Connect to Room</button>
    </div>

    <!-- MAIN BUTTONS -->
    <div id="main-ui" style="display:none;">
        <input type="file" id="file-input" style="display:none" onchange="sendFile()">
        <button class="btn btn-blue" onclick="document.getElementById('file-input').click()">📤 SELECT & SEND FILE</button>
        <button class="btn btn-exit" onclick="exitRoom()">🚪 EXIT ROOM</button>
    </div>

    <!-- PROGRESS AREA (VISIBLE ON BOTH SIDES) -->
    <div id="transfer-ui" class="transfer-box">
        <div id="file-name" style="font-weight:bold; font-size:0.9rem; margin-bottom:5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></div>
        <div id="transfer-mode" style="font-size:0.7rem; color:#64748b; text-transform:uppercase; font-weight:bold;">Initializing...</div>
        
        <div class="progress-bg"><div id="progress-bar" class="progress-fill"></div></div>
        
        <div style="display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:10px;">
            <span id="perc" style="font-weight:bold; color:var(--blue);">0%</span>
            <span id="size">0MB / 0MB</span>
        </div>
        
        <a id="dl-btn" class="btn">💾 SAVE RECEIVED FILE</a>
        <button id="cancel-btn" class="btn btn-red" onclick="cancelTransfer()">✖ CANCEL</button>
    </div>
</div>

<script>
    let peer, conn;
    let transferActive = false;
    const CHUNK_SIZE = 16384 * 4; // 64KB

    function startPeer() {
        const room = document.getElementById('room-id').value;
        if (!room) return alert("Enter code");
        document.getElementById('status').innerText = "Connecting...";
        
        peer = new Peer('sd-room-' + room);

        peer.on('open', () => {
            updateStatus("🟢 Room Active: " + room, true);
            document.getElementById('setup-ui').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
        });

        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                peer = new Peer(); 
                setTimeout(() => {
                    const c = peer.connect('sd-room-' + room, {reliable: true});
                    setupConn(c);
                }, 500);
            }
        });

        peer.on('connection', setupConn);
    }

    function setupConn(c) {
        conn = c;
        updateStatus("🟢 Connected to Peer", true);
        document.getElementById('setup-ui').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';

        let chunks = [];
        let meta = null;

        conn.on('data', (data) => {
            if (data.type === 'start') {
                transferActive = true;
                meta = data;
                chunks = [];
                showTransferUI(data.name, "Receiving...");
            } else if (data.type === 'chunk') {
                if (!transferActive) return;
                chunks.push(data.data);
                
                // UPDATE RECEIVER PROGRESS BAR
                let receivedSize = chunks.length * CHUNK_SIZE;
                let progress = (receivedSize / meta.size) * 100;
                updateProgress(progress, receivedSize, meta.size);

                if (receivedSize >= meta.size) {
                    const blob = new Blob(chunks);
                    const url = URL.createObjectURL(blob);
                    const dl = document.getElementById('dl-btn');
                    dl.href = url;
                    dl.download = meta.name;
                    dl.style.display = 'block';
                    document.getElementById('cancel-btn').style.display = 'none';
                    updateStatus("📦 File Received", true);
                    transferActive = false;
                }
            } else if (data.type === 'cancel') {
                transferActive = false;
                document.getElementById('transfer-ui').style.display = 'none';
                alert("The other person cancelled the transfer.");
            }
        });

        conn.on('close', () => {
            updateStatus("🔴 Peer Left", false);
            document.getElementById('transfer-ui').style.display = 'none';
        });
    }

    async function sendFile() {
        const file = document.getElementById('file-input').files[0];
        if (!file || !conn) return;

        transferActive = true;
        showTransferUI(file.name, "Sending...");
        
        conn.send({ type: 'start', name: file.name, size: file.size });

        let offset = 0;
        while (offset < file.size && transferActive) {
            const chunk = file.slice(offset, offset + CHUNK_SIZE);
            const buffer = await chunk.arrayBuffer();
            conn.send({ type: 'chunk', data: buffer });
            
            offset += CHUNK_SIZE;
            
            // UPDATE SENDER PROGRESS BAR
            let progress = (offset / file.size) * 100;
            if (offset % (CHUNK_SIZE * 5) === 0 || offset >= file.size) {
                updateProgress(progress, offset, file.size);
            }

            // Yield to browser to keep UI alive
            await new Promise(r => setTimeout(r, 0));
        }

        if (transferActive) {
            updateStatus("✅ Sent Successfully", true);
            document.getElementById('cancel-btn').style.display = 'none';
            transferActive = false;
        }
    }

    function cancelTransfer() {
        transferActive = false;
        if (conn) conn.send({ type: 'cancel' });
        document.getElementById('transfer-ui').style.display = 'none';
        document.getElementById('file-input').value = ""; 
    }

    function exitRoom() {
        if(peer) peer.destroy();
        location.reload(); 
    }

    function updateStatus(txt, isOnline) {
        const s = document.getElementById('status');
        s.innerText = txt;
        s.className = isOnline ? "pill online" : "pill";
    }

    function showTransferUI(name, mode) {
        document.getElementById('transfer-ui').style.display = 'block';
        document.getElementById('cancel-btn').style.display = 'block';
        document.getElementById('file-name').innerText = name;
        document.getElementById('transfer-mode').innerText = mode;
        document.getElementById('dl-btn').style.display = 'none';
        document.getElementById('progress-bar').style.width = "0%";
    }

    function updateProgress(p, cur, tot) {
        p = Math.min(p, 100);
        document.getElementById('progress-bar').style.width = p + "%";
        document.getElementById('perc').innerText = Math.round(p) + "%";
        document.getElementById('size').innerText = (cur/1024/1024).toFixed(1) + "MB / " + (tot/1024/1024).toFixed(1) + "MB";
    }
</script>

</body>
</html>
