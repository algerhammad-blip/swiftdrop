<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftDrop P2P | Industrial Transfer</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --blue: #1a7fe0; --bg: #f0f7ff; --text: #0d1b2a; --green: #00b96b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { background: white; width: 90%; max-width: 500px; padding: 2rem; border-radius: 24px; box-shadow: 0 15px 35px rgba(26,127,224,0.1); border: 1px solid #c8ddf0; }
        h1 { color: var(--blue); text-align: center; margin-top: 0; }
        .status-pill { display: inline-block; padding: 6px 14px; background: #e8f3fd; color: var(--blue); border-radius: 20px; font-size: 0.85rem; font-weight: bold; margin-bottom: 20px; }
        .input-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; color: #4a6080; }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid #ddeeff; border-radius: 12px; font-size: 1rem; box-sizing: border-box; outline: none; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--blue); }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-blue:disabled { background: #b0cfee; cursor: not-allowed; }
        .progress-area { background: #f8fbff; border: 1px solid #ddeeff; padding: 15px; border-radius: 16px; margin-top: 20px; display: none; }
        .bar-bg { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; margin: 10px 0; }
        .bar-fill { width: 0%; height: 100%; background: var(--blue); transition: width 0.1s; }
        .stats { display: flex; justify-content: space-between; font-size: 0.8rem; color: #4a6080; }
        #download-link { display: none; margin-top: 15px; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center;"><span class="status-pill" id="conn-status">Initializing...</span></div>
    <h1>🚀 SwiftDrop P2P</h1>
    
    <div class="input-group">
        <label>1. Set Room Code</label>
        <input type="text" id="room-input" placeholder="Enter 4 digits (e.g. 5555)">
        <button class="btn btn-blue" id="connect-btn" style="margin-top:10px;">Connect to Room</button>
    </div>

    <div id="transfer-ui" style="display: none;">
        <div class="input-group">
            <label>2. Share Files</label>
            <input type="file" id="file-input" style="display: none;">
            <button class="btn btn-blue" onclick="document.getElementById('file-input').click()">📁 Select & Send</button>
        </div>
    </div>

    <div class="progress-area" id="progress-area">
        <div id="file-info" style="font-weight: bold; font-size: 0.9rem;">Filename.zip</div>
        <div class="bar-bg"><div class="bar-fill" id="bar-fill"></div></div>
        <div class="stats">
            <span id="prog-percent">0%</span>
            <span id="prog-size">0 / 0 MB</span>
        </div>
        <a id="download-link" class="btn btn-blue" style="background:var(--green); display:none; text-align:center;">⬇️ Download Ready</a>
    </div>
</div>

<script>
    const CHUNK_SIZE = 16384; // 16KB chunks for high stability
    let peer = null;
    let conn = null;

    const statusLabel = document.getElementById('conn-status');
    const roomInput = document.getElementById('room-input');
    const connectBtn = document.getElementById('connect-btn');
    const transferUI = document.getElementById('transfer-ui');
    const progressArea = document.getElementById('progress-area');
    const barFill = document.getElementById('bar-fill');
    const progPercent = document.getElementById('prog-percent');
    const progSize = document.getElementById('prog-size');
    const fileInfo = document.getElementById('file-info');
    const downloadLink = document.getElementById('download-link');

    connectBtn.onclick = () => {
        const roomCode = roomInput.value;
        if (!roomCode) return alert("Enter a code!");

        connectBtn.disabled = true;
        statusLabel.innerText = "Setting up room...";

        // Logic: Device A is Sender (-S), Device B is Receiver (-R)
        // We try to be the Receiver first, if we can't, we are the Sender
        peer = new Peer('sd-' + roomCode);

        peer.on('open', (id) => {
            statusLabel.innerText = "Room Active: " + roomCode;
            transferUI.style.display = "block";
            connectBtn.style.display = "none";
            roomInput.disabled = true;
        });

        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                // Room occupied? We try to connect to the occupant
                statusLabel.innerText = "Connecting to Peer...";
                setupConnection(peer.connect('sd-' + roomCode, { label: 'file-transfer', reliable: true }));
            }
        });

        peer.on('connection', (c) => {
            setupConnection(c);
        });
    };

    function setupConnection(c) {
        conn = c;
        statusLabel.innerText = "🟢 Connected to Peer";
        statusLabel.style.background = "#e6f9f1";
        statusLabel.style.color = "#00875a";
        transferUI.style.display = "block";

        let receivedChunks = [];
        let metadata = null;

        conn.on('data', (data) => {
            // Check if it's metadata or a chunk
            if (data.type === 'metadata') {
                metadata = data;
                receivedChunks = [];
                progressArea.style.display = "block";
                fileInfo.innerText = "Receiving: " + data.name;
                downloadLink.style.display = "none";
            } else if (data.type === 'chunk') {
                receivedChunks.push(data.buffer);
                const progress = (receivedChunks.length / metadata.totalChunks) * 100;
                updateProgress(progress, receivedChunks.length * CHUNK_SIZE, metadata.size);

                if (receivedChunks.length === metadata.totalChunks) {
                    const blob = new Blob(receivedChunks);
                    const url = URL.createObjectURL(blob);
                    downloadLink.href = url;
                    downloadLink.download = metadata.name;
                    downloadLink.style.display = "block";
                    statusLabel.innerText = "📦 File Received";
                }
            }
        });
    }

    document.getElementById('file-input').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file || !conn) return;

        progressArea.style.display = "block";
        fileInfo.innerText = "Sending: " + file.name;
        
        const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
        
        // Send Metadata
        conn.send({
            type: 'metadata',
            name: file.name,
            size: file.size,
            totalChunks: totalChunks
        });

        // Chunk and Send
        const buffer = await file.arrayBuffer();
        for (let i = 0; i < totalChunks; i++) {
            const start = i * CHUNK_SIZE;
            const end = Math.min(start + CHUNK_SIZE, file.size);
            const chunk = buffer.slice(start, end);
            
            conn.send({
                type: 'chunk',
                buffer: chunk
            });

            if (i % 5 === 0) { // Update UI every 5 chunks to save CPU
                const progress = ((i + 1) / totalChunks) * 100;
                updateProgress(progress, end, file.size);
            }
        }
        updateProgress(100, file.size, file.size);
        statusLabel.innerText = "✅ Transfer Complete";
    };

    function updateProgress(percent, current, total) {
        barFill.style.width = percent + "%";
        progPercent.innerText = Math.round(percent) + "%";
        progSize.innerText = (current / 1048576).toFixed(2) + " / " + (total / 1048576).toFixed(2) + " MB";
    }
</script>

</body>
</html>
