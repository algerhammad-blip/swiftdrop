<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon 3D Runner</title>
    <!-- Load Three.js for 3D graphics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* Prevents pull-to-refresh on mobile */
        }
        canvas { display: block; }
        
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #score-board {
            position: absolute;
            top: 20px;
            font-size: 30px;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }
        #menu {
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border: 2px solid #ff00ff;
            border-radius: 15px;
            text-align: center;
            pointer-events: auto;
            box-shadow: 0 0 20px #ff00ff;
        }
        h1 { color: #ff00ff; margin-top: 0; text-shadow: 0 0 10px #ff00ff; font-size: 2.5rem;}
        p { color: #fff; font-size: 1.2rem; margin-bottom: 25px; }
        .desktop-hint { color: #aaa; font-size: 0.9rem; }
        button {
            background: #00ffff;
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 0 15px #00ffff;
            transition: 0.2s;
        }
        button:hover { background: #fff; box-shadow: 0 0 25px #fff; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="score-board">Score: 0</div>
        <div id="menu">
            <h1>NEON RUNNER</h1>
            <p>Swipe Left/Right or A/D to dodge.<br>Swipe Up or Space to jump.</p>
            <p class="desktop-hint">Collect blue orbs to score! Dodge red blocks!</p>
            <button id="start-btn">PLAY</button>
        </div>
    </div>

    <script>
        // --- 1. Basic Three.js Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050510, 0.015); // Adds fade-to-black in the distance

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 6, 8); 
        camera.lookAt(0, 0, -15); // Look down the track

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 2. Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // --- 3. Scenery (Moving Grid) ---
        const gridHelper = new THREE.GridHelper(200, 100, 0xff00ff, 0x440044);
        gridHelper.position.y = 0;
        scene.add(gridHelper);

        // --- 4. The Player ---
        const playerGeo = new THREE.BoxGeometry(1, 1, 1);
        const playerMat = new THREE.MeshLambertMaterial({ color: 0x00ffff, emissive: 0x004444 });
        const player = new THREE.Mesh(playerGeo, playerMat);
        scene.add(player);

        // --- 5. Game State & Variables ---
        let isPlaying = false;
        let score = 0;
        let speed = 0.4;
        let obstacles = [];
        
        // Player Movement Logic
        const laneWidth = 3;
        let currentLane = 0; // -1 (Left), 0 (Center), 1 (Right)
        
        // Jump Logic
        let isJumping = false;
        let yVelocity = 0;
        const gravity = 0.035;
        const jumpStrength = 0.45;

        // UI Elements
        const scoreBoard = document.getElementById('score-board');
        const menu = document.getElementById('menu');
        const startBtn = document.getElementById('start-btn');

        // --- 6. Spawner Functions ---
        const obstacleGeo = new THREE.BoxGeometry(2, 2, 2);
        const obstacleMat = new THREE.MeshLambertMaterial({ color: 0xff0000, emissive: 0x550000 });

        function spawnObstacle() {
            if (!isPlaying) return;
            
            const obs = new THREE.Mesh(obstacleGeo, obstacleMat);
            // Pick a random lane
            const lane = Math.floor(Math.random() * 3) - 1; // -1, 0, or 1
            
            obs.position.set(lane * laneWidth, 1, -100);
            scene.add(obs);
            obstacles.push({ mesh: obs, lane: lane, passed: false });

            // Spawn rate gets faster as score goes up
            let nextSpawn = Math.max(500, 1500 - (score * 20)); 
            setTimeout(spawnObstacle, nextSpawn);
        }

        // --- 7. Controls (Keyboard & Touch) ---
        function moveLeft() { if (currentLane > -1 && isPlaying) currentLane--; }
        function moveRight() { if (currentLane < 1 && isPlaying) currentLane++; }
        function jump() { 
            if (!isJumping && isPlaying) {
                isJumping = true;
                yVelocity = jumpStrength;
            }
        }

        // Keyboard
        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') moveLeft();
            if (e.code === 'ArrowRight' || e.code === 'KeyD') moveRight();
            if (e.code === 'ArrowUp' || e.code === 'Space' || e.code === 'KeyW') jump();
        });

        // Touch / Swipe Controls
        let touchStartX = 0;
        let touchStartY = 0;
        window.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        });
        window.addEventListener('touchend', e => {
            let dx = e.changedTouches[0].screenX - touchStartX;
            let dy = e.changedTouches[0].screenY - touchStartY;
            
            // Check if swipe was mostly horizontal or vertical
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30) moveRight();
                else if (dx < -30) moveLeft();
            } else {
                if (dy < -30) jump(); // Swiped up
            }
        });

        // Window Resizing
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });

        // --- 8. Core Game Loop ---
        function animate() {
            requestAnimationFrame(animate);

            if (isPlaying) {
                // Smoothly slide player to their target lane
                const targetX = currentLane * laneWidth;
                player.position.x += (targetX - player.position.x) * 0.15;

                // Handle Jump Physics
                if (isJumping) {
                    player.position.y += yVelocity;
                    yVelocity -= gravity;
                    if (player.position.y <= 0.5) { // 0.5 is ground level for our cube
                        player.position.y = 0.5;
                        isJumping = false;
                        yVelocity = 0;
                    }
                }

                // Animate grid to simulate forward movement
                gridHelper.position.z += speed;
                if (gridHelper.position.z > 2) gridHelper.position.z = 0;

                // Speed increases slightly over time
                speed += 0.0001;

                // Move obstacles and check collisions
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    let obs = obstacles[i];
                    obs.mesh.position.z += speed;

                    // Collision Detection (Check Z depth, X lane, and Y height)
                    if (obs.mesh.position.z > player.position.z - 1 && 
                        obs.mesh.position.z < player.position.z + 1) {
                        
                        if (obs.lane === currentLane && player.position.y < 1.8) {
                            gameOver();
                        }
                    }

                    // Score increment
                    if (obs.mesh.position.z > player.position.z && !obs.passed) {
                        score += 10;
                        obs.passed = true;
                        scoreBoard.innerText = `Score: ${score}`;
                    }

                    // Remove objects that passed the camera
                    if (obs.mesh.position.z > 10) {
                        scene.remove(obs.mesh);
                        obstacles.splice(i, 1);
                    }
                }
            }

            // Spin the player slightly for style
            player.rotation.x += 0.02;
            player.rotation.y += 0.02;

            renderer.render(scene, camera);
        }

        // --- 9. Game Management ---
        function startGame() {
            menu.style.display = 'none';
            scoreBoard.style.display = 'block';
            
            // Reset state
            score = 0;
            speed = 0.4;
            currentLane = 0;
            player.position.set(0, 0.5, 0);
            scoreBoard.innerText = `Score: 0`;
            
            // Clear old obstacles
            obstacles.forEach(obs => scene.remove(obs.mesh));
            obstacles = [];

            isPlaying = true;
            setTimeout(spawnObstacle, 1000);
        }

        function gameOver() {
            isPlaying = false;
            menu.style.display = 'block';
            menu.querySelector('h1').innerText = "CRASHED!";
            menu.querySelector('p').innerText = `Final Score: ${score}`;
            startBtn.innerText = "TRY AGAIN";
        }

        startBtn.addEventListener('click', startGame);

        // Start Rendering Loop
        player.position.set(0, 0.5, 0); // initial position
        animate();
    </script>
</body>
</html>
