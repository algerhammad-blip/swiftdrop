<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftDrop P2P Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --blue: #1a7fe0;
            --blue-hover: #1565c0;
            --bg: #f0f4f8;
            --text: #0f172a;
            --text-light: #64748b;
            --green: #10b981;
            --green-hover: #059669;
            --red: #ef4444;
            --red-hover: #dc2626;
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            background: var(--card-bg);
            width: 90%;
            max-width: 480px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--border);
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            color: var(--blue);
            margin-top: 0;
            font-size: 1.6rem;
            margin-bottom: 25px;
        }

        .status-box { text-align: center; margin-bottom: 25px; }
        .pill {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            background: #f1f5f9;
            color: var(--text-light);
            display: inline-block;
            transition: all 0.3s ease;
        }
        .pill.online { background: #d1fae5; color: var(--green); }
        .pill.waiting { background: #fef3c7; color: #d97706; }
        .pill.error { background: #fee2e2; color: var(--red); }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 15px;
            transition: border-color 0.2s;
            text-align: center;
            font-weight: bold;
            letter-spacing: 2px;
        }
        input[type="text"]:focus { border-color: var(--blue); }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-sizing: border-box;
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-blue { background: var(--blue); color: white; }
        .btn-blue:hover:not(:disabled) { background: var(--blue-hover); }

        .btn-red { background: var(--red); color: white; margin-top: 10px; }
        .btn-red:hover:not(:disabled) { background: var(--red-hover); }

        .btn-green { background: var(--green); color: white; text-decoration: none; margin-top: 15px; }
        .btn-green:hover:not(:disabled) { background: var(--green-hover); }

        .btn-exit {
            background: transparent;
            color: var(--text-light);
            border: 2px solid var(--border);
            margin-top: 15px;
        }
        .btn-exit:hover:not(:disabled) { background: #f8fafc; color: var(--text); }

        .transfer-box {
            background: #f8fafc;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            display: none;
            margin-top: 25px;
        }

        .file-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 15px;
        }
        #file-name {
            font-weight: bold;
            font-size: 1rem;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text);
        }
        #transfer-mode {
            font-size: 0.75rem;
            color: var(--text-light);
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        .progress-bg {
            width: 100%;
            height: 14px;
            background: #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--blue), #4facfe);
            transition: width 0.15s linear;
            border-radius: 8px;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 5px;
        }
        .stats-val { font-weight: 600; color: var(--text); }
        .text-blue { color: var(--blue); }
    </style>
</head>
<body>

<div class="card">
    <div class="status-box"><span id="status" class="pill">Waiting to Connect...</span></div>
    <h2>🚀 SwiftDrop Pro</h2>

    <div id="setup-ui">
        <input type="text" id="room-id" placeholder="Enter Room Code (e.g. 1234)" autocomplete="off">
        <button class="btn btn-blue" onclick="startPeer()" id="connect-btn">🔗 Connect / Create Room</button>
    </div>

    <div id="main-ui" style="display:none;">
        <input type="file" id="file-input" style="display:none" onchange="sendFile()">
        <button class="btn btn-blue" id="select-file-btn" onclick="document.getElementById('file-input').click()">📤 Select & Send File</button>
        <button class="btn btn-exit" id="exit-btn" onclick="exitRoom()">🚪 Exit Room</button>
    </div>

    <div id="transfer-ui" class="transfer-box">
        <div class="file-info">
            <div id="file-name">filename.mp4</div>
            <div id="transfer-mode">Initializing...</div>
        </div>
        <div class="stats-row">
            <span>Progress: <span id="perc" class="stats-val text-blue">0%</span></span>
            <span id="size" class="stats-val">0.0 MB / 0.0 MB</span>
        </div>
        <div class="progress-bg"><div id="progress-bar" class="progress-fill"></div></div>
        <div class="stats-row" style="margin-top: 10px;">
            <span>Speed: <span id="speed" class="stats-val">-- MB/s</span></span>
            <span>ETA: <span id="eta" class="stats-val">--</span></span>
        </div>
        <a id="dl-btn" class="btn btn-green" style="display:none;">💾 Save File</a>
        <button id="cancel-btn" class="btn btn-red" onclick="cancelTransfer()">✖ Cancel Transfer</button>
    </div>
</div>

<script>
    // ============================================================
    //  OPTIMIZED CONSTANTS — tuned for maximum WebRTC throughput
    // ============================================================
    const CHUNK_SIZE  = 128 * 1024;         // 128 KB per message (WebRTC-safe max)
    const BUFFER_HIGH = 16  * 1024 * 1024;  // 16 MB — pause sending above this
    const BUFFER_LOW  = 4   * 1024 * 1024;  // 4  MB — resume sending below this

    // ============================================================
    //  GLOBAL STATE
    // ============================================================
    let peer, conn;
    let transferActive = false;
    let receivedChunks = [];
    let receivedBytes  = 0;          // O(1) counter — no recalculation
    let fileMetadata   = null;

    let lastStatsTime  = 0;
    let lastStatsBytes = 0;

    const sleep = ms => new Promise(r => setTimeout(r, ms));

    // ============================================================
    //  PEERJS CONNECTION
    // ============================================================
    function startPeer() {
        const roomInput = document.getElementById('room-id').value.trim();
        if (!roomInput) { alert("Please enter a room code!"); return; }

        document.getElementById('connect-btn').disabled = true;
        updateStatus("Connecting to server...", "waiting");

        peer = new Peer('swiftdrop-room-' + roomInput);

        peer.on('open', () => {
            updateStatus(`🟢 Room '${roomInput}' created. Waiting for peer...`, "waiting");
            document.getElementById('setup-ui').style.display = 'none';
        });

        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                updateStatus("🟡 Room found. Joining...", "waiting");
                peer = new Peer();
                peer.on('open', () => {
                    const c = peer.connect('swiftdrop-room-' + roomInput, { reliable: true });
                    c.on('open', () => setupConn(c));
                });
            } else {
                updateStatus("🔴 Connection Error", "error");
                document.getElementById('connect-btn').disabled = false;
                alert("Error: " + err.message);
            }
        });

        peer.on('connection', (connection) => {
            if (conn) { connection.close(); return; }
            setupConn(connection);
        });
    }

    // ============================================================
    //  CONNECTION SETUP — tune the data channel for speed
    // ============================================================
    function setupConn(connection) {
        conn = connection;

        // ★ Key speed tuning on the raw RTCDataChannel
        if (conn.dataChannel) {
            conn.dataChannel.binaryType = 'arraybuffer';
            conn.dataChannel.bufferedAmountLowThreshold = BUFFER_LOW;
        }

        updateStatus("🟢 Connected securely to peer!", "online");
        document.getElementById('setup-ui').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';

        conn.on('data', handleIncomingData);

        conn.on('close', () => {
            updateStatus("🔴 Peer disconnected.", "error");
            resetTransferUI();
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('setup-ui').style.display = 'block';
            document.getElementById('connect-btn').disabled = false;
            conn = null;
        });
    }

    // ============================================================
    //  RECEIVER — handles raw binary chunks + control messages
    // ============================================================
    async function handleIncomingData(data) {

        // ── Raw ArrayBuffer = file chunk (ZERO serialization overhead) ──
        if (data instanceof ArrayBuffer) {
            if (!transferActive) return;
            receivedChunks.push(data);
            receivedBytes += data.byteLength;
            updateProgressAndStats(receivedBytes, fileMetadata.size);
            if (receivedBytes >= fileMetadata.size) finishReceiving();
            return;
        }

        // ── Blob fallback (some browser/PeerJS combos) ──
        if (data instanceof Blob) {
            if (!transferActive) return;
            const buf = await data.arrayBuffer();
            receivedChunks.push(buf);
            receivedBytes += buf.byteLength;
            updateProgressAndStats(receivedBytes, fileMetadata.size);
            if (receivedBytes >= fileMetadata.size) finishReceiving();
            return;
        }

        // ── JSON control messages ──
        if (data && typeof data === 'object') {
            if (data.type === 'start') {
                transferActive = true;
                fileMetadata   = data;
                receivedChunks = [];
                receivedBytes  = 0;
                initStatsTracker();
                showTransferUI(data.name, "Receiving...");
                lockMainUI(true);
            } else if (data.type === 'cancel') {
                alert("The sender cancelled the file transfer.");
                resetTransferUI();
                lockMainUI(false);
            }
        }
    }

    // ============================================================
    //  SENDER — read-ahead pipelining + raw binary send
    // ============================================================
    async function sendFile() {
        const fileInput = document.getElementById('file-input');
        const file = fileInput.files[0];
        if (!file || !conn || !conn.open) return;

        transferActive = true;
        lockMainUI(true);
        initStatsTracker();
        showTransferUI(file.name, "Sending...");

        // Ensure channel is tuned
        if (conn.dataChannel) {
            conn.dataChannel.binaryType = 'arraybuffer';
            conn.dataChannel.bufferedAmountLowThreshold = BUFFER_LOW;
        }

        // Signal the receiver
        conn.send({ type: 'start', name: file.name, size: file.size, mime: file.type });

        let offset = 0;

        // ★ Read-ahead: pre-read the first chunk before the loop starts
        let pendingRead = readChunk(file, offset);

        while (offset < file.size && transferActive) {

            // Await the current chunk (already in-flight from previous iteration)
            const buffer    = await pendingRead;
            const bytesRead = buffer.byteLength;
            const nextOffset = offset + bytesRead;

            // ★ Pipelining: kick off the NEXT read while we send the current one
            if (nextOffset < file.size) {
                pendingRead = readChunk(file, nextOffset);
            }

            // ★ Back-pressure: wait if WebRTC buffer is getting full
            if (conn.dataChannel.bufferedAmount > BUFFER_HIGH) {
                while (conn.dataChannel.bufferedAmount > BUFFER_LOW && transferActive) {
                    await sleep(5);   // 5 ms poll — 10x faster than the old 50 ms
                }
            }

            if (!transferActive || !conn || !conn.open) break;

            // ★ Send raw ArrayBuffer — PeerJS sends it as native binary
            //   (no JSON wrapper = no base64 bloat = no encode/decode CPU cost)
            conn.send(buffer);
            offset = nextOffset;

            updateProgressAndStats(offset, file.size);

            // Yield to browser paint every ~2 MB so progress bar stays smooth
            if (offset % (CHUNK_SIZE * 16) < CHUNK_SIZE) {
                await sleep(0);
            }
        }

        // Completion
        if (transferActive && offset >= file.size) {
            // Wait for the WebRTC buffer to fully flush before declaring success
            while (conn && conn.open && conn.dataChannel.bufferedAmount > 0) {
                await sleep(10);
            }

            document.getElementById('cancel-btn').style.display = 'none';
            document.getElementById('transfer-mode').innerText = "✅ Sent Successfully";
            document.getElementById('speed').innerText = "--";
            document.getElementById('eta').innerText = "--";
            transferActive = false;
            setTimeout(() => { lockMainUI(false); }, 2000);
        }

        fileInput.value = "";
    }

    /** Read a single chunk from the File object */
    function readChunk(file, offset) {
        const end = Math.min(offset + CHUNK_SIZE, file.size);
        return file.slice(offset, end).arrayBuffer();
    }

    // ============================================================
    //  RECEIVER COMPLETION
    // ============================================================
    function finishReceiving() {
        transferActive = false;
        const blob = new Blob(receivedChunks, { type: fileMetadata.mime });
        const url  = URL.createObjectURL(blob);

        const dlBtn = document.getElementById('dl-btn');
        dlBtn.href     = url;
        dlBtn.download = fileMetadata.name;
        dlBtn.style.display = 'flex';

        document.getElementById('cancel-btn').style.display = 'none';
        document.getElementById('transfer-mode').innerText = "✅ File Ready to Save";
        document.getElementById('speed').innerText = "--";
        document.getElementById('eta').innerText = "--";

        lockMainUI(false);
        receivedChunks = [];
        receivedBytes  = 0;
    }

    // ============================================================
    //  CANCEL & EXIT
    // ============================================================
    function cancelTransfer() {
        transferActive = false;
        if (conn && conn.open) conn.send({ type: 'cancel' });
        resetTransferUI();
        lockMainUI(false);
        document.getElementById('file-input').value = "";
    }

    function exitRoom() {
        if (confirm("Are you sure you want to leave the room?")) {
            if (peer) peer.destroy();
            location.reload();
        }
    }

    // ============================================================
    //  UI HELPERS (unchanged)
    // ============================================================
    function updateStatus(text, type) {
        const el = document.getElementById('status');
        el.innerText = text;
        el.className = "pill " + type;
    }

    function showTransferUI(name, mode) {
        document.getElementById('transfer-ui').style.display = 'block';
        document.getElementById('cancel-btn').style.display = 'block';
        document.getElementById('dl-btn').style.display = 'none';
        document.getElementById('file-name').innerText = name;
        document.getElementById('transfer-mode').innerText = mode;
        document.getElementById('progress-bar').style.width = "0%";
        document.getElementById('speed').innerText = "Calculating...";
        document.getElementById('eta').innerText = "Calculating...";
    }

    function resetTransferUI() {
        transferActive = false;
        document.getElementById('transfer-ui').style.display = 'none';
        receivedChunks = [];
        receivedBytes  = 0;
    }

    function lockMainUI(isLocked) {
        document.getElementById('select-file-btn').disabled = isLocked;
        document.getElementById('exit-btn').disabled = isLocked;
    }

    function initStatsTracker() {
        lastStatsTime  = Date.now();
        lastStatsBytes = 0;
    }

    function updateProgressAndStats(currentBytes, totalBytes) {
        let percent = (currentBytes / totalBytes) * 100;
        document.getElementById('progress-bar').style.width = Math.min(percent, 100) + "%";
        document.getElementById('perc').innerText = Math.floor(percent) + "%";
        document.getElementById('size').innerText = formatBytes(currentBytes) + ' / ' + formatBytes(totalBytes);

        const now = Date.now();
        const timeDiff = now - lastStatsTime;
        if (timeDiff >= 500 || currentBytes === totalBytes) {
            const bytesDiff = currentBytes - lastStatsBytes;
            const speedBps  = (bytesDiff / timeDiff) * 1000;
            document.getElementById('speed').innerText = formatBytes(speedBps) + "/s";

            const remaining = totalBytes - currentBytes;
            const etaSec    = speedBps > 0 ? remaining / speedBps : 0;
            document.getElementById('eta').innerText = formatTime(etaSec);

            lastStatsBytes = currentBytes;
            lastStatsTime  = now;
        }
    }

    function formatBytes(bytes, decimals = 2) {
        if (bytes === 0) return '0 Bytes';
        const k  = 1024;
        const dm = decimals < 0 ? 0 : decimals;
        const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    }

    function formatTime(seconds) {
        if (!isFinite(seconds) || seconds < 0) return "--";
        if (seconds < 1) return "< 1s";
        seconds = Math.round(seconds);
        if (seconds < 60) return seconds + "s";
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return m + "m " + s + "s";
    }
</script>

</body>
</html>
